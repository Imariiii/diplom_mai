# Разработка с hot reload: фронтенд в контейнере с монтированием ./frontend.
# Запуск: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#
# Рекомендуемый ежедневный цикл без контейнера для UI: только project-db (+ опционально backend)
# в Docker, фронт — `cd frontend && pnpm dev` на хосте (см. README.md).

services:
    frontend:
        # Отдельный тег, чтобы `docker compose build` с dev-файлом не затирал production-образ `code-frontend`
        image: code-frontend-dev
        build:
            context: .
            dockerfile: frontend/Dockerfile.dev
        environment:
            NODE_ENV: development
            WATCHPACK_POLLING: "true"
            CHOKIDAR_USEPOLLING: "true"
            NEXT_PUBLIC_API_URL: http://localhost:8000
            NEXT_PUBLIC_WS_URL: ws://localhost:8000
        volumes:
            - ./frontend:/app
            - frontend_node_modules:/app/node_modules
            - frontend_next_cache:/app/.next

volumes:
    frontend_node_modules:
    frontend_next_cache:
