[pytest]
asyncio_mode = auto
testpaths = backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    integration: интеграционные тесты с реальными СУБД
    docker_integration: интеграционные тесты, которые поднимают test-only Docker Compose
