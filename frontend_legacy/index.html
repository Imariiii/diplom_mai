<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система нагрузочного тестирования БД</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .section h2 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        
        select, input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        
        button {
            background: #667eea;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .status {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .results {
            margin-top: 20px;
        }
        
        .result-item {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }
        
        .result-item h3 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .result-item table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .result-item th,
        .result-item td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        .result-item th {
            background: #f8f9fa;
            font-weight: 600;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Система нагрузочного тестирования БД</h1>
        <p class="subtitle">Сравнение производительности MySQL и PostgreSQL</p>
        
        <!-- Статус подключения -->
        <div class="section">
            <h2>Статус подключений</h2>
            <div id="healthStatus" class="status info">Проверка подключений...</div>
            <button onclick="checkHealth()">Обновить статус</button>
        </div>
        
        <!-- Настройки теста -->
        <div class="section">
            <h2>Настройки теста</h2>
            <div class="form-group">
                <label for="querySelect">Выберите запрос:</label>
                <select id="querySelect">
                    <option value="">Загрузка...</option>
                </select>
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="mysqlCheck" checked> MySQL (Sakila)
                </label>
                <label>
                    <input type="checkbox" id="postgresqlCheck" checked> PostgreSQL (Pagila)
                </label>
            </div>
            <div class="form-group">
                <label for="iterations">Количество итераций:</label>
                <input type="number" id="iterations" value="10" min="1" max="100">
            </div>
            <button onclick="runSingleTest()">Запустить тест</button>
            <button onclick="runFullTest()" style="margin-left: 10px;">Полный набор тестов</button>
        </div>
        
        <!-- Результаты -->
        <div class="section">
            <h2>Результаты</h2>
            <div id="results"></div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:8000';
        
        // Проверка здоровья сервиса
        async function checkHealth() {
            const statusDiv = document.getElementById('healthStatus');
            statusDiv.className = 'status info';
            statusDiv.textContent = 'Проверка подключений...';
            
            try {
                const response = await fetch(`${API_URL}/health`);
                const data = await response.json();
                
                if (data.status === 'ok') {
                    const mysqlStatus = data.mysql === 'connected' ? '✅' : '❌';
                    const postgresStatus = data.postgresql === 'connected' ? '✅' : '❌';
                    
                    statusDiv.className = 'status success';
                    statusDiv.innerHTML = `
                        <strong>Статус:</strong> ${data.status}<br>
                        MySQL: ${mysqlStatus} ${data.mysql}<br>
                        PostgreSQL: ${postgresStatus} ${data.postgresql}
                    `;
                } else {
                    statusDiv.className = 'status error';
                    statusDiv.textContent = 'Ошибка подключения';
                }
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = `Ошибка: ${error.message}`;
            }
        }
        
        // Загрузка списка запросов
        async function loadQueries() {
            try {
                const response = await fetch(`${API_URL}/queries`);
                const queries = await response.json();
                
                const select = document.getElementById('querySelect');
                select.innerHTML = '<option value="">Все запросы</option>';
                
                queries.forEach(query => {
                    const option = document.createElement('option');
                    option.value = query.id;
                    option.textContent = `${query.name} - ${query.description}`;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Ошибка загрузки запросов:', error);
            }
        }
        
        // Запуск одиночного теста
        async function runSingleTest() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>Выполнение теста...</p></div>';
            
            const queryId = document.getElementById('querySelect').value;
            const dbTypes = [];
            if (document.getElementById('mysqlCheck').checked) dbTypes.push('mysql');
            if (document.getElementById('postgresqlCheck').checked) dbTypes.push('postgresql');
            const iterations = parseInt(document.getElementById('iterations').value);
            
            try {
                const response = await fetch(`${API_URL}/test/single`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        query_id: queryId || null,
                        db_types: dbTypes,
                        iterations: iterations
                    })
                });
                
                const result = await response.json();
                displayResults([result]);
            } catch (error) {
                resultsDiv.innerHTML = `<div class="status error">Ошибка: ${error.message}</div>`;
            }
        }
        
        // Запуск полного набора тестов
        async function runFullTest() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>Выполнение полного набора тестов...</p></div>';
            
            const dbTypes = [];
            if (document.getElementById('mysqlCheck').checked) dbTypes.push('mysql');
            if (document.getElementById('postgresqlCheck').checked) dbTypes.push('postgresql');
            const iterations = parseInt(document.getElementById('iterations').value);
            
            try {
                const response = await fetch(`${API_URL}/test/full`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        db_types: dbTypes,
                        iterations: iterations
                    })
                });
                
                const data = await response.json();
                displayResults(data.results);
                
                if (data.charts) {
                    resultsDiv.innerHTML += `
                        <div class="result-item">
                            <h3>Созданные графики и отчеты</h3>
                            <p><strong>Сравнение:</strong> ${data.charts.comparison || 'Не создан'}</p>
                            <p><strong>Статистика:</strong> ${data.charts.statistics || 'Не создан'}</p>
                            <p><strong>Отчет:</strong> ${data.charts.report || 'Не создан'}</p>
                        </div>
                    `;
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div class="status error">Ошибка: ${error.message}</div>`;
            }
        }
        
        // Отображение результатов
        function displayResults(results) {
            const resultsDiv = document.getElementById('results');
            let html = '';
            
            results.forEach(result => {
                const comparison = result.comparison || {};
                let tableRows = '';
                
                for (const [dbType, stats] of Object.entries(comparison)) {
                    if (stats.avg_time_ms !== undefined) {
                        tableRows += `
                            <tr>
                                <td>${dbType}</td>
                                <td>${stats.avg_time_ms.toFixed(2)} мс</td>
                                <td>${stats.min_time_ms.toFixed(2)} мс</td>
                                <td>${stats.max_time_ms.toFixed(2)} мс</td>
                                <td>${stats.successful}</td>
                                <td>${stats.failed}</td>
                            </tr>
                        `;
                    }
                }
                
                html += `
                    <div class="result-item">
                        <h3>Запрос: ${result.query_id}</h3>
                        <table>
                            <thead>
                                <tr>
                                    <th>СУБД</th>
                                    <th>Среднее время</th>
                                    <th>Мин. время</th>
                                    <th>Макс. время</th>
                                    <th>Успешно</th>
                                    <th>Ошибок</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${tableRows}
                            </tbody>
                        </table>
                    </div>
                `;
            });
            
            resultsDiv.innerHTML = html;
        }
        
        // Инициализация при загрузке страницы
        window.onload = function() {
            checkHealth();
            loadQueries();
        };
    </script>
</body>
</html>
