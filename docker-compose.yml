version: '3.8'

services:
    history-db:
        image: postgres:15-alpine
        container_name: test_history_db
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: history123
            POSTGRES_DB: test_history
        ports:
        - "5433:5432"
        volumes:
        - history_db_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d test_history"]
            interval: 5s
            timeout: 5s
            retries: 5
        restart: unless-stopped
        networks:
        - loadtest-network

networks:
    loadtest-network:
        driver: bridge

volumes:
    history_db_data:
        driver: local
