# Конфигурация подключений к базам данных
#
# ВНИМАНИЕ: Подключения к тестируемым БД (mysql, postgresql) теперь управляются
# динамически через UI/API и хранятся в БД истории (test_history).
# Этот файл содержит только конфигурацию служебной БД для истории тестов.
#
# Для миграции существующих подключений из YAML в БД выполните:
#   python -m backend.scripts.migrate_yaml_to_db

databases:
  # Отдельная БД для хранения истории тестов
  test_history:
    host: localhost
    port: 5433
    user: postgres
    password: "history123"
    database: test_history
    driver: postgresql

# Настройки тестирования (используются как fallback по умолчанию)
test_settings:
  default_users: 10
  default_spawn_rate: 2
  default_duration: 60  # секунды
  default_queries:
    - "SELECT * FROM actor LIMIT 100"
    - "SELECT * FROM film WHERE length > 120"
    - "SELECT COUNT(*) FROM rental"
    - "SELECT customer_id, COUNT(*) FROM rental GROUP BY customer_id"
